<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynko - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="auth-container" class="auth-container">
        <div id="auth-logo" class="auth-logo">
            <img src="https://cdn.phototourl.com/free/2026-06-08-2a556232-b138-49a7-a830-66b7ce8a4f19.png" alt="Lynko Logo">
        </div>
        
        <h1>¡Hola otra vez!</h1>
        <p>Ingresa tus datos para continuar aprendiendo</p>
        
        <form id="login-form" action="/login" method="POST">
            {% if error %}
            <p style="color: #D32F2F; font-weight: 700; font-size: 14px; text-align: center;">{{ error }}</p>
            {% endif %}

            <div class="form-group">
                <label for="email-login">Correo electrónico</label>
                <input 
                    id="email-login"
                    type="email" 
                    name="correo" 
                    placeholder="ejemplo@correo.com" 
                    required
                    aria-label="Correo electrónico para login"
                >
            </div>


            <div class="form-group">
                <label for="password-login">Contraseña</label>
                <input 
                    id="password-login"
                    type="password" 
                    name="contrasena" 
                    placeholder="Ingresa tu contraseña" 
                    required
                    aria-label="Contraseña para login"
                >
            </div>

            <button type="submit" class="btn-auth">Ingresar</button>
        </form>

        <div id="auth-footer" class="auth-footer">
            ¿Eres nuevo por aquí? <a href="/static/registro.html">Regístrate gratis</a>
        </div>
    </div>

    <script src="/static/password-validator.js"></script>
</body>
</html>
