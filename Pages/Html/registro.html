<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynko - Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="auth-container" class="auth-container">
        <div id="auth-logo" class="auth-logo">
            <img src="https://cdn.phototourl.com/free/2026-06-08-2a556232-b138-49a7-a830-66b7ce8a4f19.png" alt="Lynko Logo">
        </div>
        
        <h1>¡Únete a Lynko!</h1>
        <p>Crea tu cuenta gratis y empieza la aventura</p>
        
        <form id="registro-form" action="/registro" method="POST">
            {% if error %}
            <p style="color: #D32F2F; font-weight: 700; font-size: 14px; text-align: center;">{{ error }}</p>
            {% endif %}

            <div class="form-group">
                <label for="nombre-input">Tu Nombre</label>
                <input 
                    id="nombre-input"
                    type="text" 
                    name="nombre" 
                    placeholder="¿Cómo te llamas?" 
                    required
                    aria-label="Nombre completo"
                >
            </div>

            <div class="form-group">
                <label for="email-input">Correo electrónico</label>
                <input 
                    id="email-input"
                    type="email" 
                    name="correo" 
                    placeholder="ejemplo@correo.com" 
                    required
                    aria-label="Correo electrónico"
                >
            </div>

            <div class="form-group">
                <label for="password-input">Contraseña</label>
                <input 
                    id="password-input"
                    type="password" 
                    name="contrasena" 
                    placeholder="Crea una contraseña segura" 
                    required
                    aria-label="Contraseña"
                >

            </div>

            <button type="submit" class="btn-auth">Registrarse</button>
        </form>

        <div id="auth-footer" class="auth-footer">
            ¿Ya tienes una cuenta? <a href="/static/login.html">Inicia sesión</a>
        </div>
    </div>

    <script src="/static/password-validator.js"></script>
    <script>

        document.getElementById('registro-form').addEventListener('submit', (event) => {
            const passwordInput = document.getElementById('password-input');
            const password = passwordInput.value;


            const hasMinLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /\d/.test(password);

            if (!(hasMinLength && hasUppercase && hasLowercase && hasNumber)) {
                event.preventDefault();
                alert('⚠️ La contraseña debe cumplir todos los requisitos:\n\n✓ Mínimo 8 caracteres\n✓ Una letra mayúscula\n✓ Una letra minúscula\n✓ Un número');
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
